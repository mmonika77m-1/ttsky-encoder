 # Tiny Tapeout project information
project:
  title:        "Parity Generator"
  author:       "Monika"
  discord:      ""      # Optional
  description:  "Generates even parity bit from 4 input bits"
  language:     "Verilog"
  clock_hz:     0       # Combinational, no clock
  tiles:        "1x1"
  top_module:   "tt_um_parity_generator"

  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "Data bit 0"
  ui[1]: "Data bit 1"
  ui[2]: "Data bit 2"
  ui[3]: "Data bit 3"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Parity bit"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
